<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文档分块 - 金融知识问答助手</title>
    <link rel="stylesheet" href="/static/styles.css?v=prod-ui-20260709i" />
  </head>
  <body>
    <main class="app-shell chunks-page">
      <header class="topbar chunks-topbar">
        <div class="brand-block">
          <a class="product-mark back-mark" href="/" aria-label="返回工作台">←</a>
          <div>
            <p class="eyebrow">Chunk inspector</p>
            <h1 id="chunkPageTitle">文档分块详情</h1>
            <p class="brand-subtitle">查看切块、页码、字符数与入库原文</p>
          </div>
        </div>
        <div class="chunk-toolbar">
          <input id="chunkSearchInput" placeholder="搜索当前文档分块内容" />
          <button id="expandAllBtn" class="ghost" type="button">展开全部</button>
          <button id="collapseAllBtn" class="ghost" type="button">收起全部</button>
        </div>
      </header>

      <section class="system-panel chunk-meta-panel" aria-label="文档分块概览">
        <div class="status-block">
          <span class="status-dot ok"></span>
          <div>
            <b id="chunkDocSource">正在加载文档</b>
            <small id="chunkDocId">等待读取 document_id</small>
          </div>
        </div>
        <div class="chunk-meta-grid">
          <div><span>切块数</span><b id="chunkTotal">-</b></div>
          <div><span>当前显示</span><b id="chunkShown">-</b></div>
          <div><span>字符数</span><b id="chunkChars">-</b></div>
        </div>
      </section>

      <section class="chunks-layout">
        <aside class="chunk-index-panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Index</p>
              <h2>分块导航</h2>
            </div>
            <span id="chunkIndexCount" class="tag">0</span>
          </div>
          <div id="chunkIndexList" class="chunk-index-list"></div>
        </aside>

        <section class="chunk-detail-panel">
          <div class="section-title">
            <div>
              <p class="panel-kicker">Chunks</p>
              <h2>分块内容</h2>
            </div>
            <span id="chunkFilterState">loading</span>
          </div>
          <div id="chunkList" class="chunk-list">
            <div class="empty-note">正在读取分块详情...</div>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/chunks.js?v=prod-ui-20260709i"></script>
  </body>
</html>
